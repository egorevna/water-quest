<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f83d1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Water Quest">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Water Quest</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="icon" href="icons/icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <section class="invite-gate" id="invite-gate" aria-label="Вход по инвайту">
      <div class="invite-card">
        <p class="eyebrow">Water Quest</p>
        <h1>Инвайт</h1>
        <p class="invite-copy">Это приватная версия приложения. Введи код, чтобы продолжить.</p>
        <form id="invite-form" class="invite-form">
          <input id="invite-code" name="invite-code" type="password" autocomplete="one-time-code" placeholder="Код доступа" required>
          <button type="submit">Войти</button>
        </form>
        <p class="invite-status" id="invite-status" aria-live="polite"></p>
      </div>
    </section>

    <main class="app-shell">
      <section class="hero-panel" aria-labelledby="quest-title">
        <header class="top-bar">
          <div>
            <p class="eyebrow">Water Quest</p>
            <h1 id="quest-title">Квест дня</h1>
          </div>
          <button class="icon-button" id="stats-toggle" type="button" aria-label="Показать статистику">▦</button>
        </header>

        <div class="reward-banner" id="reward-banner" aria-live="polite"></div>

        <div class="tank-wrap" aria-label="Прогресс воды за сегодня">
          <div class="tank">
            <div class="water" id="water-level"></div>
            <div class="tank-gloss"></div>
            <div class="tank-content">
              <span class="percent" id="today-percent">0%</span>
              <span class="liters" id="today-liters">0.0 / 4 л</span>
            </div>
          </div>
        </div>

        <div class="quick-actions" aria-label="Быстро добавить воду">
          <button class="amount-button" type="button" data-amount="300">+300 мл</button>
          <button class="amount-button primary" type="button" data-amount="400">+400 мл</button>
          <button class="amount-button" type="button" data-amount="500">+500 мл</button>
        </div>

        <button class="undo-button" id="undo-button" type="button">Отменить последний глоток</button>
      </section>

      <section class="reminder-panel" aria-label="Пуш-напоминания">
        <div>
          <span>Пуши</span>
          <strong id="reminder-status">Проверяю доступность...</strong>
        </div>
        <div class="reminder-actions">
          <button class="reminder-button" id="enable-reminders" type="button">Включить</button>
          <button class="reminder-button secondary" id="disable-reminders" type="button">Выключить</button>
        </div>
      </section>

      <section class="streak-panel" aria-label="Серии и награды">
        <div class="streak-card main">
          <span>Серия</span>
          <strong id="current-streak">0 дней</strong>
        </div>
        <div class="streak-card">
          <span>Лучшее</span>
          <strong id="best-streak">0</strong>
        </div>
        <div class="progress-card">
          <div class="progress-copy">
            <span>Промежуточная победа</span>
            <strong id="week-progress">0/7</strong>
          </div>
          <div class="mini-track"><span id="week-bar"></span></div>
        </div>
        <div class="progress-card">
          <div class="progress-copy">
            <span>Суперкубок</span>
            <strong id="month-progress">0/30</strong>
          </div>
          <div class="mini-track gold"><span id="month-bar"></span></div>
        </div>
      </section>

      <section class="stats-panel hidden" id="stats-panel" aria-label="Статистика за 30 дней">
        <div class="panel-heading">
          <h2>Последние 30 дней</h2>
          <p>Золотые клетки — дни с 4 литрами или больше.</p>
        </div>
        <div class="days-grid" id="days-grid"></div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
